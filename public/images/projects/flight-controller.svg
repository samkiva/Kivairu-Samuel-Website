<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="50%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Circuit board / MCU graphic -->
  <rect x="300" y="140" width="200" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="360" y="180" width="80" height="80" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Pins -->
  <line x1="270" y1="180" x2="300" y2="180" stroke="#fbbf24" stroke-width="3"/>
  <line x1="270" y1="210" x2="300" y2="210" stroke="#fbbf24" stroke-width="3"/>
  <line x1="270" y1="240" x2="300" y2="240" stroke="#fbbf24" stroke-width="3"/>
  <line x1="500" y1="180" x2="530" y2="180" stroke="#fbbf24" stroke-width="3"/>
  <line x1="500" y1="210" x2="530" y2="210" stroke="#fbbf24" stroke-width="3"/>
  <line x1="500" y1="240" x2="530" y2="240" stroke="#fbbf24" stroke-width="3"/>
  <text x="400" y="380" text-anchor="middle" fill="#fffbeb" font-family="system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="2">AUTONOMOUS FLIGHT CONTROLLER</text>
  <text x="400" y="405" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="14">BARE-METAL C++ PID FIRMWARE</text>
</svg>
