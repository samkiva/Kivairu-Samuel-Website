<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311b92"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid overlay -->
  <g stroke="url(#grid)" stroke-width="1" opacity="0.4">
    <path d="M 0,90 L 800,90 M 0,180 L 800,180 M 0,270 L 800,270 M 0,360 L 800,360"/>
    <path d="M 160,0 L 160,450 M 320,0 L 320,450 M 480,0 L 480,450 M 640,0 L 640,450"/>
  </g>
  <!-- Aircraft / Telemetry HUD vector graphics -->
  <circle cx="400" cy="225" r="120" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="8 8" opacity="0.6"/>
  <circle cx="400" cy="225" r="80" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <path d="M 400 105 L 400 135 M 400 315 L 400 345 M 280 225 L 310 225 M 490 225 L 520 225" stroke="#06b6d4" stroke-width="2"/>
  <!-- Drone / Aircraft Silhouette -->
  <path d="M 400 170 L 440 240 L 410 240 L 400 255 L 390 240 L 360 240 Z" fill="#818cf8" stroke="#a5b4fc" stroke-width="2"/>
  <text x="400" y="390" text-anchor="middle" fill="#e0e7ff" font-family="system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="2">AEROSPACE RESEARCH INITIATIVE</text>
  <text x="400" y="415" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="14">AUTONOMOUS FLIGHT &amp; EMBEDDED SYSTEMS</text>
</svg>
